<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - Nhà hàng ABC">
        Nhà hàng ABC
    </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: white;
        }

        header {
            background-color: #333;
            color: white;
            padding: 15px 20px;
            border-bottom: 1px solid #ddd;
        }

        header a {
            color: white;
            text-decoration: none;
        }

        .header-content {
            max-width: 1000px;
            margin: 0 auto;
        }

        .logo {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .nav-menu {
            list-style: none;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .nav-menu a {
            font-size: 14px;
            color: white;
            text-decoration: none;
        }

        .nav-menu a:hover {
            text-decoration: underline;
        }

        main {
            background-color: white;
            min-height: calc(100vh - 200px);
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        footer {
            background-color: #f5f5f5;
            border-top: 1px solid #ddd;
            padding: 20px;
            margin-top: 40px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }

        @media (max-width: 768px) {
            .nav-menu {
                gap: 10px;
            }

            main {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
<header>
    <div class="header-content">
        <div class="logo"><a href="/">Nhà Hàng ABC</a></div>
        <nav>
            <ul class="nav-menu">
                <li><a href="/bai5/quick-order">Đặt Món Nhanh</a></li>
                <li><a href="/bai5/dishes">Danh Sách Món</a></li>
                <li><a href="/">Trang Chính</a></li>
            </ul>
        </nav>
    </div>
</header>

<main layout:fragment="content">
</main>

<footer>
    <p>Nhà Hàng ABC | 0909 000 111 | lienhe@nhahangabc.vn</p>
</footer>
</body>
</html>
