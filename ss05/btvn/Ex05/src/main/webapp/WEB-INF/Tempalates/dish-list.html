<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{templates/layout/main-layout}"
      lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Món Ăn</title>
    <style>
        h1 {
            margin: 20px 0 15px 0;
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
        }

        .alert {
            padding: 10px;
            margin: 15px 0;
            border: 1px solid;
        }

        .alert-danger {
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }

        .alert-success {
            background-color: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
        }

        .link-button {
            display: inline-block;
            padding: 10px 20px;
            margin-bottom: 15px;
            background-color: #333;
            color: white;
            text-decoration: none;
            border: 1px solid #333;
        }

        .link-button:hover {
            background-color: #555;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid #ddd;
        }

        th {
            background-color: #f5f5f5;
            border-bottom: 2px solid #ddd;
            padding: 10px;
            text-align: left;
            font-weight: bold;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background-color: #f9f9f9;
        }

        .status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 12px;
        }

        .status.available {
            background-color: #d4edda;
            color: #155724;
        }

        .status.unavailable {
            background-color: #f8d7da;
            color: #721c24;
        }

        .btn-edit {
            padding: 5px 10px;
            background-color: #333;
            color: white;
            text-decoration: none;
            border: 1px solid #333;
        }

        .btn-detail {
            padding: 5px 10px;
            background-color: #0d6efd;
            color: white;
            text-decoration: none;
            border: 1px solid #0d6efd;
        }

        .btn-detail:hover {
            background-color: #0b5ed7;
        }

        .btn-edit:hover {
            background-color: #555;
        }

        .action-group {
            display: flex;
            gap: 8px;
        }

        .empty-message {
            text-align: center;
            padding: 30px;
            color: #666;
        }
    </style>
</head>
<body>
<section layout:fragment="content">
    <h1>Danh Sách Món Ăn</h1>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <a href="/bai5/quick-order" class="link-button">Quay Lại Đặt Hàng</a>


    <div th:if="${dishes != null and !#lists.isEmpty(dishes)}">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Tên Món</th>
                <th>Giá</th>
                <th>Trạng Thái</th>
                <th>Hành Động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="dish : ${dishes}">
                <td th:text="${dish.id}">1</td>
                <td th:text="${dish.name}">Phở bò</td>
                <td style="color: red; font-weight: bold;" th:text="${dish.price}">
                    50000
                </td>
                <td>
                            <span class="status"
                                  th:classappend="${dish.available} ? 'available' : 'unavailable'"
                                  th:text="${dish.available} ? 'Còn phục vụ' : 'Tạm hết'}">
                            Trạng thái
                        </span>
                </td>
                <td>
                    <div class="action-group">
                        <a th:href="@{|/bai5/dishes/${dish.id}|}" class="btn-detail">Xem detail</a>
                        <a th:href="@{|/bai5/edit/${dish.id}|}" class="btn-edit">Sửa</a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${dishes == null or #lists.isEmpty(dishes)}" class="empty-message">
        <p>Không có dữ liệu</p>
    </div>
</section>

</body>
</html>
