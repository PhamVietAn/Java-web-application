<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Chi tiết dự án</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <a class="btn btn-link px-0 mb-3" th:href="@{/projects}">&larr; Quay lại danh sách</a>

    <div th:if="${errorMessage != null}" class="alert alert-warning shadow-sm" th:text="${errorMessage}">
        Không tìm thấy dự án.
    </div>

    <div th:if="${project != null}" class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="h4 mb-1" th:text="${project.prjName}">Tên dự án</h1>
                    <small>Mã dự án: <span th:text="${project.prjId}">1</span></small>
                </div>
                <span class="badge text-bg-light text-primary" th:text="${project.totalPersonnel} + ' nhân sự'">0 nhân sự</span>
            </div>
        </div>
        <div class="card-body">
            <div class="row g-4">
                <div class="col-12 col-lg-8">
                    <h2 class="h5">Mô tả dự án</h2>
                    <p class="mb-4" th:text="${project.prjDesc}">Mô tả dự án</p>

                    <div class="row row-cols-1 row-cols-md-2 g-3">
                        <div class="col">
                            <div class="border rounded p-3 h-100 bg-white">
                                <div class="text-muted small">Tên giám đốc dự án</div>
                                <div class="fw-semibold" th:text="${project.prjDirector}">Giám đốc</div>
                            </div>
                        </div>
                        <div class="col">
                            <div class="border rounded p-3 h-100 bg-white">
                                <div class="text-muted small">Tổng số nhân sự</div>
                                <div class="fw-semibold" th:text="${project.totalPersonnel}">0</div>
                            </div>
                        </div>
                        <div class="col">
                            <div class="border rounded p-3 h-100 bg-white">
                                <div class="text-muted small">Ngày bắt đầu</div>
                                <div class="fw-semibold" th:text="${#dates.format(project.prjStartDate, 'dd/MM/yyyy')}">01/01/2024</div>
                            </div>
                        </div>
                        <div class="col">
                            <div class="border rounded p-3 h-100 bg-white">
                                <div class="text-muted small">Ngày kết thúc</div>
                                <div class="fw-semibold" th:text="${#dates.format(project.prjEndDate, 'dd/MM/yyyy')}">31/12/2026</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-lg-4">
                    <div class="border rounded p-3 bg-white h-100">
                        <h2 class="h6">Thông tin nhanh</h2>
                        <ul class="list-unstyled mb-0">
                            <li class="mb-2"><strong>Mã dự án:</strong> <span th:text="${project.prjId}">1</span></li>
                            <li class="mb-2"><strong>Tên dự án:</strong> <span th:text="${project.prjName}">Tên dự án</span></li>
                            <li class="mb-2"><strong>Giám đốc:</strong> <span th:text="${project.prjDirector}">Giám đốc</span></li>
                            <li class="mb-2"><strong>Nhân sự:</strong> <span th:text="${project.totalPersonnel}">0</span></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
