<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Danh sách dự án</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4">
        <div>
            <h1 class="h3 mb-1">Danh sách dự án</h1>
            <p class="text-muted mb-0">Danh sách tất cả dự án đang được quản lý.</p>
        </div>
        <span class="badge text-bg-primary fs-6 mt-3 mt-md-0" th:text="${#lists.size(projectList)} + ' dự án'">0 dự án</span>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-striped table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Mã dự án</th>
                    <th>Tên dự án</th>
                    <th>Giám đốc dự án</th>
                    <th>Ngày bắt đầu</th>
                    <th>Ngày kết thúc</th>
                    <th class="text-center">Tổng số nhân sự</th>
                    <th class="text-end">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="project : ${projectList}">
                    <td th:text="${project.prjId}">1</td>
                    <td>
                        <div class="fw-semibold" th:text="${project.prjName}">Tên dự án</div>
                        <small class="text-muted" th:text="${project.prjDesc}">Mô tả dự án</small>
                    </td>
                    <td th:text="${project.prjDirector}">Giám đốc</td>
                    <td th:text="${#dates.format(project.prjStartDate, 'dd/MM/yyyy')}">01/01/2024</td>
                    <td th:text="${#dates.format(project.prjEndDate, 'dd/MM/yyyy')}">31/12/2026</td>
                    <td class="text-center" th:text="${project.totalPersonnel}">0</td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-primary" th:href="@{/projects/{id}(id=${project.prjId})}">Xem chi tiết</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(projectList)}">
                    <td colspan="7" class="text-center text-muted py-4">Không có dữ liệu dự án.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
